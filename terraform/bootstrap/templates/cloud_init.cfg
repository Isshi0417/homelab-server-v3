#cloud-config
package_update: true
package_upgrade: false

users:
    - name: ${admin_user}
      groups: wheel, systemd-journal
      sudo: ["ALL=(ALL) NOPASSWD:ALL"]
      shell: /bin/bash
      ssh_authorized_keys:
        - ${ssh_key}

runcmd:
    - sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication no/g' /etc/ssh/sshd_config
    - systemctl restart sshd
